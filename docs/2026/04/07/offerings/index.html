                <h3>Offerings</h3>

<p style='margin:0;'><em><small><small>07 April 2026</small></small></em></p>  

<p class='url' style='margin:0;'><em><small><small>https://poems.culturing.net/2026/04/07/offerings/</small></small></em></p>  

<figure>  
    <blockquote>  
        I find more bitter than death<br/>  
        &nbsp;&nbsp;&nbsp;&nbsp;the woman who is a snare,<br/>  
        whose heart is a trap<br/>  
        &nbsp;&nbsp;&nbsp;&nbsp;and whose hands are chains.<br/>  
        The man who pleases God will escape her,<br/>  
        &nbsp;&nbsp;&nbsp;&nbsp;but the sinner she will ensnare.<br/>  
    <blockquote>  
    <figcaption>Ecclesiastes 7:26</figcaption>  
</figure>  

<p>I offered my heart.<br />
She offered confusion in return.</p>
